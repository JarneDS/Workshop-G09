<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>three.js | Template</title>
        <link rel="stylesheet" href="/css/reset.css" />
        <link rel="stylesheet" href="/css/main.css" />
        <script src="/js/main.js" type="module" defer></script>
    </head>
    <body class="page">
        <div class="page__wrapper">
            <main class="page__content">
                <div class="canvas__wrapper | js-canvas-wrapper">
                    <canvas class="canvas | js-canvas-3d"></canvas>
                </div>
                <div class="camera-controles__container">
                    <div class="camera-controles">
                        <button class="camera-precedent">&#60;</button>
                        <p>Cameras</p>
                        <button class="camera-suivant">&#62;</button>
                    </div>
                </div>
                <section class="jukebox">
                    <button onclick="history.back()" class="btnRetour">← Retour</button>
                </section>
            </main>
        </div>
    </body>
</html>
